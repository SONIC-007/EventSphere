<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your EventSphere account to discover and host enterprise events.">
  <title>Sign Up – EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-wrapper" id="app">
    <div class="auth-page-container">
      <div class="auth-form-side">
        <div class="auth-card">
        <div class="flex items-center gap-sm mb-xl" style="cursor:pointer;" onclick="window.location.href='/'">
          <div class="brand-icon">
            <span class="material-symbols-outlined">hub</span>
          </div>
          <span style="font-family:var(--font-heading); font-size:1.5rem; font-weight:800; color:var(--ink);">EventSphere</span>
        </div>

        <div>
          <div class="hero-kicker" style="color:var(--ink); border-color:var(--border); background:var(--slate-fill);">New account</div>
          <h1 class="mb-xs" style="font-size: 2rem; margin-top:0.9rem; color:var(--ink);">Create Account</h1>
          <p class="mb-lg" style="font-size: 0.95rem;">Join event ops platform for organizers and participants.</p>

          <form id="signup-form" onsubmit="handleSignup(event)" class="flex flex-col gap-md">
            <div class="form-group mb-xs">
              <label class="form-label" for="signup-name">Full Name</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined">person</span>
                <input class="form-input" type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
              </div>
            </div>

            <div class="form-group mb-xs">
              <label class="form-label" for="signup-email">Work Email</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined">mail</span>
                <input class="form-input" type="email" id="signup-email" placeholder="you@company.com" required autocomplete="email">
              </div>
            </div>

            <div class="form-group mb-xs">
              <label class="form-label" for="signup-password">Password</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined">lock</span>
                <input class="form-input" type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
              </div>
            </div>

            <div class="form-group mb-xs">
              <label class="form-label" for="signup-role">Account Type</label>
              <div class="auth-toggle" id="signup-role-toggle">
                <button type="button" class="active" data-role="participant" onclick="setSignupRole('participant', this)">Participant</button>
                <button type="button" data-role="organizer" onclick="setSignupRole('organizer', this)">Organizer</button>
              </div>
              <input type="hidden" id="signup-role" value="participant">
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg mt-sm" id="signup-submit">
              Create Account
            </button>
          </form>

          <div class="auth-note">Organizer access starts with signup role. Dashboard and create flows stay role-aware.</div>

          <div class="mt-xl text-center" style="font-size: 0.9rem; color: var(--on-surface-variant);">
            Already have an account? <a href="/login.html" id="signup-to-login" class="font-bold">Log In</a>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    function setSignupRole(role, button) {
      document.getElementById('signup-role').value = role;
      document.querySelectorAll('#signup-role-toggle button').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined">sync</span> Creating account...';

      try {
        const res = await api('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('signup-name').value,
            email: document.getElementById('signup-email').value,
            password: document.getElementById('signup-password').value,
            role: document.getElementById('signup-role').value,
          }),
        });

        Auth.save(res.data);
        showToast('Account created successfully!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 400);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }
  </script>
</body>
</html>
