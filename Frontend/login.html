<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your EventSphere account to manage enterprise events and registrations.">
  <title>Log In – EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-wrapper" id="app">
    <div class="auth-page-container">
      <div class="auth-form-side">
        <div class="auth-card">
        <div class="flex items-center gap-sm mb-xl" style="cursor:pointer;" onclick="window.location.href='/'">
          <div class="brand-icon">
            <span class="material-symbols-outlined">hub</span>
          </div>
          <span style="font-family:var(--font-heading); font-size:1.5rem; font-weight:800; color:var(--ink);">EventSphere</span>
        </div>

        <div>
          <div class="hero-kicker" style="color:var(--ink); border-color:var(--border); background:var(--slate-fill);">Secure access</div>
          <h1 class="mb-xs" style="font-size: 2rem; margin-top:0.9rem; color:var(--ink);">Welcome back</h1>
          <p class="mb-lg" style="font-size: 0.95rem;">Sign in to manage events, registrations, and feedback.</p>

          <form id="login-form" onsubmit="handleLogin(event)" class="flex flex-col gap-md">
            <div class="form-group mb-xs">
              <label class="form-label" for="login-email">Email</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined">mail</span>
                <input class="form-input" type="email" id="login-email" placeholder="you@company.com" required autocomplete="email">
              </div>
            </div>

            <div class="form-group mb-xs">
              <div class="flex items-center justify-between mb-xs">
                <label class="form-label" for="login-password" style="margin-bottom:0;">Password</label>
              </div>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined">lock</span>
                <input class="form-input" type="password" id="login-password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg mt-sm" id="login-submit">
              Sign In
            </button>
          </form>

          <div class="auth-note">No home landing for signed-in users. Sign in, then go straight to dashboard.</div>

          <div class="mt-xl text-center" style="font-size: 0.9rem; color: var(--on-surface-variant);">
            Don't have an account? <a href="/signup.html" id="login-to-signup" class="font-bold">Sign Up</a>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined">sync</span> Signing in...';

      try {
        const res = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });

        Auth.save(res.data);
        showToast('Login successful!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 400);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }
  </script>
</body>
</html>
