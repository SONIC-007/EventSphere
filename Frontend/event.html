<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View event details, register, and leave feedback on EventSphere.">
  <title>Event Details – EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-wrapper" id="app">
    <main class="main-content">
      <div class="container" id="event-detail-container">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- Feedback Modal -->
  <div class="modal-overlay" id="feedback-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Leave Feedback</h3>
        <button class="modal-close" onclick="closeFeedbackModal()" id="feedback-modal-close">✕</button>
      </div>
      <form onsubmit="handleFeedback(event)" id="feedback-form">
        <div class="form-group text-center">
          <label class="form-label">Rating</label>
          <div id="feedback-rating" class="star-rating" data-rating="0" style="font-size:2rem; justify-content:center;">
            <span class="star" data-value="1" onclick="setRating(1,'feedback-rating')" style="font-size:2rem;">★</span>
            <span class="star" data-value="2" onclick="setRating(2,'feedback-rating')" style="font-size:2rem;">★</span>
            <span class="star" data-value="3" onclick="setRating(3,'feedback-rating')" style="font-size:2rem;">★</span>
            <span class="star" data-value="4" onclick="setRating(4,'feedback-rating')" style="font-size:2rem;">★</span>
            <span class="star" data-value="5" onclick="setRating(5,'feedback-rating')" style="font-size:2rem;">★</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="feedback-comment">Comment (optional)</label>
          <textarea class="form-textarea" id="feedback-comment" placeholder="Share your experience..." maxlength="1000"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="feedback-submit">Submit Feedback</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('app').insertAdjacentHTML('afterbegin', renderNavbar(''));
    initNavbar();

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('id');
    let currentEvent = null;

    async function loadEventDetail() {
      if (!eventId) {
        document.getElementById('event-detail-container').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Event not found</div></div>';
        return;
      }

      try {
        const res = await api(`/events/${eventId}`);
        currentEvent = res.data.event;
        const e = currentEvent;
        document.title = `${e.title} – EventSphere`;

        const user = Auth.getUser();
        const isOwner = user && (String(e.createdBy?._id) === String(user.id) || user.role === 'admin');
        const deadlinePassed = new Date(e.registrationDeadline) < new Date();
        const isPast = new Date(e.date) < new Date();

        // Load feedback
        let feedbackHTML = '';
        try {
          const fbRes = await api(`/feedback/${eventId}`);
          const feedbacks = fbRes.data.feedbacks || fbRes.data || [];
          if (Array.isArray(feedbacks) && feedbacks.length > 0) {
            feedbackHTML = feedbacks.map(fb => `
              <div style="padding: var(--space-md) 0; border-bottom: 1px solid var(--border-light);">
                <div class="flex-between">
                  ${renderStars(fb.rating)}
                  <span style="font-size:0.75rem; color:var(--text-muted);">${formatDate(fb.createdAt)}</span>
                </div>
                ${fb.comment ? `<p style="margin-top:var(--space-sm); font-size:0.9rem;">${fb.comment}</p>` : ''}
              </div>
            `).join('');
          } else {
            feedbackHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">No feedback yet.</p>';
          }
        } catch { feedbackHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">No feedback yet.</p>'; }

        document.getElementById('event-detail-container').innerHTML = `
          <!-- Banner -->
          <div class="event-detail-banner" style="background: ${getGradient(e.title.length)}">
            <div style="position:relative; z-index:1;">
              <div class="flex gap-sm mb-md">
                ${statusBadge(e.status)}
                ${e.category ? `<span class="badge badge-primary">${e.category}</span>` : ''}
              </div>
              <h1 style="font-size:2rem; color:white;">${e.title}</h1>
              <p style="color:rgba(255,255,255,0.8); margin-top:var(--space-sm); font-size:0.95rem;">
                by ${e.orgId?.name || 'Unknown Organization'}
              </p>
            </div>
          </div>

          <div class="event-detail-content">
            <!-- Main Content -->
            <div>
              <div class="card" style="margin-bottom:var(--space-xl);">
                <h3 class="mb-md">About This Event</h3>
                <p style="line-height:1.8; font-size:0.95rem;">${e.description || 'No description provided.'}</p>
              </div>

              ${isOwner ? `
              <div class="card" style="margin-bottom:var(--space-xl);" id="manage-section">
                <h3 class="mb-md">Manage Event</h3>
                <div class="flex gap-md" style="flex-wrap:wrap;">
                  ${e.status === 'draft' ? `<button class="btn btn-success btn-sm" onclick="updateStatus('published')" id="btn-publish">📢 Publish</button>` : ''}
                  ${e.status === 'published' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus('completed')" id="btn-complete">✅ Mark Completed</button>` : ''}
                  ${e.status !== 'cancelled' ? `<button class="btn btn-danger btn-sm" onclick="updateStatus('cancelled')" id="btn-cancel">✕ Cancel Event</button>` : ''}
                  <button class="btn btn-secondary btn-sm" onclick="viewRegistrations()" id="btn-registrations">👥 View Registrations</button>
                </div>
              </div>
              ` : ''}

              <!-- Registrations Table (for organizers) -->
              <div id="registrations-section" class="hidden">
                <div class="card" style="margin-bottom:var(--space-xl);">
                  <h3 class="mb-md">Registrations</h3>
                  <div id="registrations-content">
                    <div class="loading-center"><div class="spinner"></div></div>
                  </div>
                </div>
              </div>

              <!-- Feedback Section -->
              <div class="card" id="feedback-section">
                <div class="flex-between mb-md">
                  <h3>Feedback & Reviews</h3>
                  ${Auth.isLoggedIn() ? `<button class="btn btn-secondary btn-sm" onclick="openFeedbackModal()" id="btn-leave-feedback">⭐ Leave Feedback</button>` : ''}
                </div>
                <div id="feedback-list">${feedbackHTML}</div>
              </div>
            </div>

            <!-- Sidebar -->
            <div class="event-detail-sidebar">
              <div class="sidebar-card" style="margin-bottom:var(--space-lg);">
                <div class="info-list">
                  <div class="info-item">
                    <div class="info-icon">📅</div>
                    <div>
                      <div class="info-label">Date & Time</div>
                      <div class="info-value">${formatDateTime(e.date)}</div>
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div>
                      <div class="info-label">Venue</div>
                      <div class="info-value">${e.venue}</div>
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon">👥</div>
                    <div>
                      <div class="info-label">Capacity</div>
                      <div class="info-value">${e.capacity} attendees</div>
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon">⏰</div>
                    <div>
                      <div class="info-label">Registration Deadline</div>
                      <div class="info-value">${formatDateTime(e.registrationDeadline)}</div>
                      ${deadlinePassed ? '<span class="badge badge-danger mt-sm">Closed</span>' : `<span class="badge badge-success mt-sm">${timeUntil(e.registrationDeadline)} left</span>`}
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon">👤</div>
                    <div>
                      <div class="info-label">Organized By</div>
                      <div class="info-value">${e.createdBy?.name || 'Unknown'}</div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Register / Cancel Button -->
              ${Auth.isLoggedIn() && !isOwner && e.status === 'published' ? `
                <div id="registration-actions">
                  ${!deadlinePassed ?
                    `<button class="btn btn-primary btn-block btn-lg" onclick="registerForEvent()" id="btn-register">🎟️ Register Now</button>` :
                    `<button class="btn btn-secondary btn-block btn-lg" disabled>Registration Closed</button>`
                  }
                  <button class="btn btn-ghost btn-block mt-sm" onclick="cancelRegistration()" id="btn-cancel-reg" style="display:none;">Cancel Registration</button>
                </div>
              ` : !Auth.isLoggedIn() ? `
                <a href="/login.html" class="btn btn-primary btn-block btn-lg" id="btn-login-to-register">Log In to Register</a>
              ` : ''}
            </div>
          </div>
        `;

        // Check if user is already registered
        if (Auth.isLoggedIn() && !isOwner) {
          checkRegistrationStatus();
        }

      } catch (err) {
        document.getElementById('event-detail-container').innerHTML =
          `<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-title">${err.message}</div></div>`;
      }
    }

    async function checkRegistrationStatus() {
      try {
        const res = await api('/registrations/me');
        const regs = res.data.registrations || [];
        const myReg = regs.find(r => String(r.eventId?._id || r.eventId) === eventId && r.status !== 'cancelled');
        if (myReg) {
          const regBtn = document.getElementById('btn-register');
          const cancelBtn = document.getElementById('btn-cancel-reg');
          if (regBtn) {
            regBtn.textContent = myReg.status === 'waitlisted' ? '⏳ Waitlisted' : '✅ Registered';
            regBtn.disabled = true;
            regBtn.classList.remove('btn-primary');
            regBtn.classList.add('btn-success');
          }
          if (cancelBtn) cancelBtn.style.display = 'block';
        }
      } catch {}
    }

    async function registerForEvent() {
      if (!requireAuth()) return;
      try {
        const res = await api(`/registrations/${eventId}/register`, { method: 'POST' });
        showToast(res.message, 'success');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function cancelRegistration() {
      if (!confirm('Cancel your registration?')) return;
      try {
        await api(`/registrations/${eventId}/cancel`, { method: 'PATCH' });
        showToast('Registration cancelled', 'info');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function updateStatus(status) {
      if (!confirm(`Change event status to "${status}"?`)) return;
      try {
        await api(`/events/${eventId}`, {
          method: 'PATCH',
          body: JSON.stringify({ status }),
        });
        showToast(`Event ${status}!`, 'success');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function viewRegistrations() {
      const section = document.getElementById('registrations-section');
      section.classList.toggle('hidden');
      if (!section.classList.contains('hidden')) {
        try {
          const res = await api(`/registrations/${eventId}`);
          const regs = res.data.registrations || [];
          if (regs.length === 0) {
            document.getElementById('registrations-content').innerHTML =
              '<p style="color:var(--text-muted);">No registrations yet.</p>';
            return;
          }
          document.getElementById('registrations-content').innerHTML = `
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Status</th>
                    <th>Registered</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${regs.map(r => `
                    <tr>
                      <td>${r.userId?.name || r.userId || 'Unknown'}</td>
                      <td>${statusBadge(r.status)}</td>
                      <td>${formatDate(r.createdAt)}</td>
                      <td>
                        ${r.status === 'registered' ?
                          `<button class="btn btn-success btn-sm" onclick="markAttendance('${r.userId?._id || r.userId}')">✓ Attended</button>` : 
                          r.status === 'attended' ? '<span class="badge badge-success">Attended</span>' : '-'
                        }
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        } catch (err) {
          document.getElementById('registrations-content').innerHTML =
            `<p style="color:var(--danger);">${err.message}</p>`;
        }
      }
    }

    async function markAttendance(userId) {
      try {
        await api(`/registrations/${eventId}/attendance/${userId}`, { method: 'PATCH' });
        showToast('Attendance marked!', 'success');
        viewRegistrations(); // refresh
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function openFeedbackModal() {
      document.getElementById('feedback-modal').classList.add('active');
    }
    function closeFeedbackModal() {
      document.getElementById('feedback-modal').classList.remove('active');
    }

    async function handleFeedback(e) {
      e.preventDefault();
      const rating = parseInt(document.getElementById('feedback-rating').dataset.rating);
      if (!rating || rating < 1) {
        showToast('Please select a rating', 'error');
        return;
      }
      try {
        await api(`/feedback/${eventId}`, {
          method: 'POST',
          body: JSON.stringify({
            rating,
            comment: document.getElementById('feedback-comment').value,
          }),
        });
        showToast('Feedback submitted!', 'success');
        closeFeedbackModal();
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    loadEventDetail();
  </script>
</body>
</html>
