<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View event details, agenda schedule, register, and review on EventSphere.">
  <title>Event Details – EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-wrapper" id="app">
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content" style="padding-top:0;">
      <div id="event-detail-container">
        <div class="spinner-center"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- Feedback Review Modal -->
  <div class="modal-overlay" id="feedback-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Submit Community Review</h3>
        <button class="modal-close" onclick="closeFeedbackModal()" id="feedback-modal-close">✕</button>
      </div>
      <form onsubmit="handleFeedback(event)" id="feedback-form">
        <div class="form-group text-center">
          <label class="form-label">Rating</label>
          <div id="feedback-rating" class="star-rating" data-rating="0" style="font-size:2rem; justify-content:center; margin-top:0.5rem;">
            <span class="star" data-value="1" onclick="setRating(1,'feedback-rating')">★</span>
            <span class="star" data-value="2" onclick="setRating(2,'feedback-rating')">★</span>
            <span class="star" data-value="3" onclick="setRating(3,'feedback-rating')">★</span>
            <span class="star" data-value="4" onclick="setRating(4,'feedback-rating')">★</span>
            <span class="star" data-value="5" onclick="setRating(5,'feedback-rating')">★</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="feedback-comment">Review / Comments</label>
          <textarea class="form-textarea" id="feedback-comment" placeholder="Share your experience attending this event..." maxlength="1000"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="feedback-submit">Submit Review</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');
    initNavbar();

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('id');
    let currentEvent = null;

    async function loadEventDetail() {
      if (!eventId) {
        showEmpty('event-detail-container', 'error', 'Event not found', 'Invalid event ID.');
        return;
      }

      try {
        const res = await api(`/events/${eventId}`);
        currentEvent = res.data.event;
        const e = currentEvent;
        document.title = `${e.title} – EventSphere`;

        const user = Auth.getUser();
        const isOwner = user && (String(e.createdBy?._id || e.createdBy) === String(user.id) || user.role === 'admin');
        const deadlinePassed = new Date(e.registrationDeadline) < new Date();

        // Load feedback
        let feedbackHTML = '';
        try {
          const fbRes = await api(`/feedback/${eventId}`);
          const feedbacks = fbRes.data.feedbacks || fbRes.data || [];
          if (Array.isArray(feedbacks) && feedbacks.length > 0) {
            feedbackHTML = feedbacks.map(fb => `
              <div style="padding: 1rem 0; border-bottom: 1px solid var(--outline-variant);">
                <div class="flex items-center justify-between">
                  ${renderStars(fb.rating)}
                  <span style="font-size:0.8rem; color:var(--text-muted);">${formatDate(fb.createdAt)}</span>
                </div>
                ${fb.comment ? `<p class="mt-xs" style="font-size:0.9rem; color:var(--on-surface);">${fb.comment}</p>` : ''}
              </div>
            `).join('');
          } else {
            feedbackHTML = '<p class="text-muted" style="font-size:0.9rem;">No reviews submitted yet.</p>';
          }
        } catch { feedbackHTML = '<p class="text-muted" style="font-size:0.9rem;">No reviews submitted yet.</p>'; }

        document.getElementById('event-detail-container').innerHTML = `
          <section class="hero-shell" style="padding:3.5rem 0 2rem;">
            <div class="container hero-grid" style="grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr); align-items:start;">
              <div>
                ${renderLifecycleRail(e.status, false)}
                <h1 class="hero-title" style="font-size: clamp(2.2rem, 4vw, 3.4rem); margin-top:1rem;">${e.title}</h1>
                <p class="hero-copy">${e.description || 'No detailed description provided.'}</p>
                <div class="hero-actions">
                  <div class="stat-tile"><strong>${formatDateTime(e.date)}</strong><span>Event time</span></div>
                  <div class="stat-tile"><strong>${formatDate(e.registrationDeadline)}</strong><span>Deadline</span></div>
                  <div class="stat-tile"><strong>${e.venue}</strong><span>Venue</span></div>
                </div>
              </div>
              <div class="card" style="background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.14); color:#fff;">
                <div class="badge badge-amber" style="margin-bottom:0.75rem;">${e.category || 'General'}</div>
                <h3 style="color:#fff; margin-bottom:0.5rem;">Registration</h3>
                <p style="color:rgba(255,255,255,0.75);">Registration deadline and event status drive actions below.</p>
                <div class="mt-md" id="registration-actions">
                  ${Auth.isLoggedIn() && !isOwner && e.status === 'published' ? `
                    ${!deadlinePassed ? `
                      <button class="btn btn-primary btn-lg btn-block" onclick="registerForEvent()" id="btn-register">
                        Join event <span class="material-symbols-outlined">arrow_forward</span>
                      </button>
                    ` : `
                      <button class="btn btn-secondary btn-lg btn-block" disabled>Registration closed</button>
                    `}
                    <button class="btn btn-ghost mt-sm" onclick="cancelRegistration()" id="btn-cancel-reg" style="display:none;">Cancel registration</button>
                  ` : !Auth.isLoggedIn() ? `
                    <a href="/login.html" class="btn btn-primary btn-lg btn-block" id="btn-login-to-register">Log in to register</a>
                  ` : ''}
                </div>
              </div>
            </div>
          </section>

          <div class="container" style="padding-top:1.75rem;">
            <div class="grid" style="grid-template-columns: 1fr 340px; gap:1.5rem;">
              
              <!-- Left Main Column -->
              <div class="flex flex-col gap-xl">
                
                <!-- About Section -->
                <div class="card">
                  <h3 class="flex items-center gap-sm mb-md" style="border-bottom:1px solid var(--border); padding-bottom:0.5rem;">
                    <span class="material-symbols-outlined" style="color:var(--primary);">info</span> About the Event
                  </h3>
                  <p style="font-size:1rem; line-height:1.7; color:var(--text);">${e.description || 'No detailed description provided.'}</p>
                </div>

                <div class="card">
                  <h3 class="flex items-center gap-sm mb-md" style="border-bottom:1px solid var(--border); padding-bottom:0.5rem;">
                    <span class="material-symbols-outlined" style="color:var(--primary);">schedule</span> Main Agenda Schedule
                  </h3>
                  <div class="flex flex-col gap-md">
                    <div class="card" style="padding:1.25rem;">
                      <div class="flex items-center gap-md">
                        <div style="background:var(--primary-container); color:var(--primary); padding:0.6rem 1rem; border-radius:var(--radius-md); text-align:center; min-width:85px;">
                          <span style="font-size:0.75rem; font-weight:800; display:block;">SESSION</span>
                          <span style="font-weight:700; font-size:0.95rem;">${formatTime(e.date)}</span>
                        </div>
                        <div>
                          <h4 style="margin-bottom:0.25rem;">${e.title} - Main Session</h4>
                          <p style="font-size:0.875rem;">Opening Keynote & Strategic Transformations in ${e.category || 'Technology'}.</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Organizer Actions Panel -->
                ${isOwner ? `
                <div class="card">
                  <h3 class="mb-md flex items-center gap-sm">
                    <span class="material-symbols-outlined" style="color:var(--primary);">admin_panel_settings</span> Host Control Actions
                  </h3>
                  <div class="flex gap-sm" style="flex-wrap:wrap;">
                    ${e.status === 'draft' ? `<button class="btn btn-success btn-sm" onclick="updateStatus('published')">Publish Event</button>` : ''}
                    ${e.status === 'published' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus('completed')">Mark Completed</button>` : ''}
                    ${e.status !== 'cancelled' ? `<button class="btn btn-danger btn-sm" onclick="updateStatus('cancelled')">Cancel Event</button>` : ''}
                    <button class="btn btn-secondary btn-sm" onclick="viewRegistrations()">View Registered Attendees</button>
                  </div>
                </div>
                ` : ''}

                <!-- Registrations Container -->
                <div id="registrations-section" class="hidden">
                  <div class="card">
                    <h3 class="mb-md">Registered Attendees</h3>
                    <div id="registrations-content"><div class="spinner-center"><div class="spinner"></div></div></div>
                  </div>
                </div>

                <!-- Feedback & Reviews -->
                <div class="card">
                  <div class="flex items-center justify-between mb-md" style="border-bottom:1px solid var(--border); padding-bottom:0.5rem;">
                    <h3 class="flex items-center gap-sm" style="margin:0;">
                      <span class="material-symbols-outlined" style="color:var(--warning);">star</span> Community Reviews
                    </h3>
                    ${Auth.isLoggedIn() ? `
                      <button class="btn btn-secondary btn-sm" onclick="openFeedbackModal()">Leave Review</button>
                    ` : ''}
                  </div>
                  <div id="feedback-list">${feedbackHTML}</div>
                </div>

              </div>

              <!-- Right Column (Sidebar Cards) -->
              <div class="flex flex-col gap-lg">
                <!-- Host Card (Sample Style) -->
                <div class="card text-center" style="padding:2rem 1.5rem;">
                  <div style="width:64px; height:64px; border-radius:var(--radius-lg); background:var(--primary-container); color:var(--primary); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;">
                    <span class="material-symbols-outlined" style="font-size:32px;">corporate_fare</span>
                  </div>
                  <h4 style="margin-bottom:0.3rem;">Hosted by ${e.orgId?.name || 'Organization'}</h4>
                  <p style="font-size:0.85rem; margin-bottom:1rem;">Delivering community events & digital experiences.</p>
                  <div style="font-size:0.85rem; color:var(--on-surface-variant); text-align:left; border-top:1px solid var(--outline-variant); padding-top:1rem;" class="flex flex-col gap-xs">
                    <div><strong>Host Name:</strong> ${e.createdBy?.name || 'Organizer'}</div>
                    <div><strong>Max Capacity:</strong> ${e.capacity} Attendees</div>
                    <div><strong>Venue:</strong> ${e.venue}</div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        `;

        if (Auth.isLoggedIn() && !isOwner) {
          checkRegistrationStatus();
        }
      } catch (err) {
        showEmpty('event-detail-container', 'error', 'Error loading event', err.message);
      }
    }

    async function checkRegistrationStatus() {
      try {
        const res = await api('/registrations/me');
        const regs = res.data.registrations || [];
        const myReg = regs.find(r => String(r.eventId?._id || r.eventId) === eventId && r.status !== 'cancelled');
        if (myReg) {
          const regBtn = document.getElementById('btn-register');
          const cancelBtn = document.getElementById('btn-cancel-reg');
          if (regBtn) {
            regBtn.innerHTML = myReg.status === 'waitlisted' ? 'Waitlisted' : 'Registered ✓';
            regBtn.disabled = true;
            regBtn.classList.remove('btn-primary');
            regBtn.classList.add('btn-success');
          }
          if (cancelBtn) cancelBtn.style.display = 'block';
        }
      } catch {}
    }

    async function registerForEvent() {
      if (!requireAuth()) return;
      try {
        const res = await api(`/registrations/${eventId}/register`, { method: 'POST' });
        showToast(res.message || 'Registered successfully!', 'success');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function cancelRegistration() {
      if (!confirm('Cancel your registration?')) return;
      try {
        await api(`/registrations/${eventId}/cancel`, { method: 'PATCH' });
        showToast('Registration cancelled', 'info');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function updateStatus(status) {
      if (!confirm(`Update status to ${status}?`)) return;
      try {
        await api(`/events/${eventId}`, {
          method: 'PATCH',
          body: JSON.stringify({ status }),
        });
        showToast(`Event status updated to ${status}!`, 'success');
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function viewRegistrations() {
      const section = document.getElementById('registrations-section');
      section.classList.toggle('hidden');
      if (!section.classList.contains('hidden')) {
        try {
          const res = await api(`/registrations/${eventId}`);
          const regs = res.data.registrations || [];
          if (regs.length === 0) {
            document.getElementById('registrations-content').innerHTML = '<p class="text-muted">No registrations yet.</p>';
            return;
          }
          document.getElementById('registrations-content').innerHTML = `
            <div class="table-responsive">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Attendee</th>
                    <th>Status</th>
                    <th>Registered Date</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${regs.map(r => `
                    <tr>
                      <td style="font-weight:600;">${r.userId?.name || 'User'} (${r.userId?.email || ''})</td>
                      <td>${statusBadge(r.status)}</td>
                      <td>${formatDate(r.createdAt)}</td>
                      <td>
                        ${r.status === 'registered' ?
                          `<button class="btn btn-success btn-sm" onclick="markAttendance('${r.userId?._id || r.userId}')">Mark Attended</button>` : 
                          r.status === 'attended' ? '<span class="badge badge-success">Attended</span>' : '-'
                        }
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        } catch (err) {
          document.getElementById('registrations-content').innerHTML = `<p style="color:var(--error);">${err.message}</p>`;
        }
      }
    }

    async function markAttendance(userId) {
      try {
        await api(`/registrations/${eventId}/attendance/${userId}`, { method: 'PATCH' });
        showToast('Attendance recorded!', 'success');
        viewRegistrations();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function openFeedbackModal() {
      document.getElementById('feedback-modal').classList.add('active');
    }
    function closeFeedbackModal() {
      document.getElementById('feedback-modal').classList.remove('active');
    }

    async function handleFeedback(e) {
      e.preventDefault();
      const rating = parseInt(document.getElementById('feedback-rating').dataset.rating);
      if (!rating || rating < 1) {
        showToast('Please select a star rating', 'error');
        return;
      }
      try {
        await api(`/feedback/${eventId}`, {
          method: 'POST',
          body: JSON.stringify({
            rating,
            comment: document.getElementById('feedback-comment').value,
          }),
        });
        showToast('Thank you for your feedback!', 'success');
        closeFeedbackModal();
        loadEventDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    loadEventDetail();
  </script>
</body>
</html>
