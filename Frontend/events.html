<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all community events on EventSphere. Filter by category, date, and venue.">
  <title>Browse Events – EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-wrapper" id="app">
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content">
      <div class="container">
        <section class="section-block" style="padding-top:2rem;">
          <div class="section-head">
            <div>
              <h1 class="section-title">Browse published events</h1>
              <p class="section-subtitle">Search, filter, and open event records with status rail and capacity at a glance.</p>
            </div>
            <div id="events-header-actions"></div>
          </div>

          <div class="card" style="padding:1rem; margin-bottom:1rem;">
            <div style="max-width: 640px; margin: 0 auto;" class="input-icon-wrapper">
              <span class="material-symbols-outlined">search</span>
              <input type="text" id="event-search-input" class="form-input" placeholder="Search events, organizers, or venues..." style="border-radius: 999px; padding-left: 3rem; height: 48px;" oninput="handleSearchInput()">
            </div>
            <div class="filter-chips mt-md" style="justify-content:center;" id="filter-chips">
              <button class="filter-chip active" data-status="published" onclick="filterByStatus('published', this)" id="filter-published">Published</button>
              <button class="filter-chip" data-status="" onclick="filterByStatus('', this)" id="filter-all">All</button>
              <button class="filter-chip" data-status="draft" onclick="filterByStatus('draft', this)" id="filter-draft">Drafts</button>
              <button class="filter-chip" data-status="completed" onclick="filterByStatus('completed', this)" id="filter-completed">Completed</button>
            </div>
          </div>

          <div class="grid grid-3" id="events-grid">
            <div class="spinner-center" style="grid-column:1/-1;"><div class="spinner"></div></div>
          </div>

          <div class="pagination mt-lg" id="pagination"></div>
        </section>

      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('events');
    initNavbar();

    if (Auth.isOrganizer()) {
      document.getElementById('events-header-actions').innerHTML = `
        <a href="/create-event.html" class="btn btn-primary btn-sm" id="events-create-btn">
          <span class="material-symbols-outlined">add</span> Create Event
        </a>
      `;
    }

    let currentPage = 1;
    let currentStatus = 'published';
    let searchQuery = '';
    let debounceTimer = null;

    async function loadEvents(page = 1, status = currentStatus, search = searchQuery) {
      currentPage = page;
      currentStatus = status;
      searchQuery = search;

      const grid = document.getElementById('events-grid');
      grid.innerHTML = '<div class="spinner-center" style="grid-column:1/-1;"><div class="spinner"></div></div>';

      try {
        let queryParams = `page=${page}&limit=9`;
        if (status) queryParams += `&status=${encodeURIComponent(status)}`;
        if (search) queryParams += `&search=${encodeURIComponent(search)}`;

        const res = await api(`/events?${queryParams}`);
        const { events, total, pages } = res.data;

        if (!events || events.length === 0) {
          showEmpty('events-grid', 'search_off', 'No events found', 'Try adjusting your search terms or filter selection.');
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        grid.innerHTML = events.map((e, i) => renderEventCard(e, i)).join('');

        if (pages > 1) {
          let paginationHTML = '';
          for (let i = 1; i <= pages; i++) {
            paginationHTML += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadEvents(${i})" id="page-${i}">${i}</button>`;
          }
          document.getElementById('pagination').innerHTML = paginationHTML;
        } else {
          document.getElementById('pagination').innerHTML = '';
        }
      } catch (err) {
        showEmpty('events-grid', 'error', 'Error loading events', err.message);
      }
    }

    function filterByStatus(status, el) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadEvents(1, status, searchQuery);
    }

    function handleSearchInput() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const val = document.getElementById('event-search-input').value.trim();
        loadEvents(1, currentStatus, val);
      }, 350);
    }

    loadEvents();
  </script>
</body>
</html>
